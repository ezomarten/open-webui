name: Frontend Build

on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - 'backend/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'docs/**'
      - '*.md'
  pull_request:
    branches:
      - main
      - dev
    paths-ignore:
      - 'backend/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'docs/**'
      - '*.md'

jobs:
  build:
    name: 'Format & Build Frontend'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --force

      - name: Check Frontend Formatting
        run: npx prettier --check "**/*.{js,ts,svelte,css,md,html,json}"

      - name: Regenerate i18n catalogs
        run: npm run i18n:parse

      - name: Check for generated file changes
        run: git diff --exit-code

      - name: Build Frontend
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run build

  test-frontend:
    name: 'Frontend Unit Tests'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --force

      - name: Run vitest
        run: npm run test:frontend
