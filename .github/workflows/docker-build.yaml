name: Build and publish fork image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional GHCR tag to publish. Defaults to the pushed tag without the leading v, or git-<sha> for manual runs.
        required: false
        type: string
      push_stable:
        description: Also publish the stable tag
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Derive image coordinates
        id: vars
        shell: bash
        env:
          INPUT_IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag || '' }}
        run: |
          REPOSITORY="${GITHUB_REPOSITORY,,}"

          if [ -n "$INPUT_IMAGE_TAG" ]; then
            VERSION="$INPUT_IMAGE_TAG"
          elif [ "$GITHUB_REF_TYPE" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="git-${GITHUB_SHA::12}"
          fi

          {
            echo "repository=${REPOSITORY}"
            echo "version=${VERSION}"
            echo "image=${{ env.REGISTRY }}/${REPOSITORY}"
          } >> "$GITHUB_OUTPUT"

      - name: Compose image tags
        id: tags
        shell: bash
        env:
          PUSH_STABLE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.push_stable || 'false' }}
        run: |
          VERSION_TAG="${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.version }}"
          GIT_TAG="${{ steps.vars.outputs.image }}:git-${GITHUB_SHA::12}"

          {
            echo "values<<EOF"
            echo "$VERSION_TAG"
            if [ "$GIT_TAG" != "$VERSION_TAG" ]; then
              echo "$GIT_TAG"
            fi
            if [ "$PUSH_STABLE" = "true" ]; then
              echo "${{ steps.vars.outputs.image }}:stable"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.tags.outputs.values }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_HASH=${{ github.sha }}
